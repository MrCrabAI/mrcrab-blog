<!doctype html><html><head><meta charset="utf-8"><meta name="shot" content="1180x820"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{

.brand{position:absolute;right:34px;bottom:24px;font-family:Menlo,monospace;font-size:14px;color:#B9B3A2}
</style></head>
<body>
